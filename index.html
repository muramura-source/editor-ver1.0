<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.2.0/encoding.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ================================================================
           CSS CUSTOM PROPERTIES  — all theme-switchable vars live here.
           applyTheme() in JS overwrites these at runtime.
           ================================================================ */
        :root {
            /* Core */
            --bg:           #f0f2f5;
            --editor-bg:    #ffffff;
            --text:         #1a1d23;
            --border:       #d1d5db;
            --accent:       #2563eb;
            --accent-h:     #1d4ed8;
            --danger:       #dc2626;
            --success:      #16a34a;
            --caret:        #2563eb;
            /* Gutter / line numbers */
            --ln-bg:        #f7f8fa;
            --ln-fg:        #aaa;
            --hl-line:      rgba(37,99,235,0.045);
            /* Indent guide */
            --indent-guide: rgba(0,0,0,0.12);
            /* Toolbar */
            --toolbar-top:  #f5f7fa;
            --toolbar-bot:  #e8eaed;
            /* Tabs */
            --tab-bar-bg:   #e8eaed;
            --tab-active-bg:#ffffff;
            --tab-drag-bg:  #dbeafe;
            --tab-hover:    rgba(0,0,0,.06);
            /* Buttons */
            --tbtn-hover:        rgba(0,0,0,.08);
            --tbtn-active-bg:    #dbeafe;
            --tbtn-active-border:#93c5fd;
            /* Inputs / selects */
            --input-bg:     #ffffff;
            /* Search */
            --srch-sep:     #ddd;
            --srch-counter: #999;
            /* Status bar */
            --statusbar-top:#e8eaed;
            --statusbar-bot:#dde0e4;
            --sb-border:    #ccc;
            /* Modal / help */
            --modal-bg:     #ffffff;
            --modal-text:   #555;
            --help-h3-color:#888;
            --help-border:  #eee;
            --sc-key-bg:    #f3f4f6;
            --sc-key-border:#d1d5db;
            --sc-key-shadow:#c8ccd1;
            --sc-key-text:  #374151;
            --gutter-legend-bg:#f9fafb;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOOLBAR ──────────────────────────────────────────────── */
        .toolbar {
            background: linear-gradient(180deg, var(--toolbar-top), var(--toolbar-bot));
            border-bottom: 1px solid var(--border);
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 2px;
            flex-wrap: wrap;
            min-height: 42px;
            user-select: none;
            flex-shrink: 0;
        }
        .tsep { width: 1px; height: 22px; background: var(--border); margin: 0 5px; flex-shrink: 0; }
        .tgroup { display: flex; align-items: center; gap: 2px; }

        /* 拡張メニュー – flex の直接メンバーとして流れ込む */
        #toolbar-ext {
            display: none;
            align-items: center;
            gap: 2px;
        }
        #toolbar-ext.open { display: flex; }

        .tbtn {
            padding: 4px 7px;
            border-radius: 5px;
            border: 1px solid transparent;
            background: transparent;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text);
            white-space: nowrap;
            transition: background .12s, border-color .12s, color .12s;
            line-height: 1;
        }
        .tbtn svg { width: 14px; height: 14px; flex-shrink: 0; }
        .tbtn:hover:not(:disabled) { background: var(--tbtn-hover); border-color: var(--border); }
        .tbtn:disabled  { opacity: .4; cursor: not-allowed; }
        .tbtn.active    { background: var(--tbtn-active-bg); border-color: var(--tbtn-active-border); color: var(--accent); }
        .tbtn.primary   { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tbtn.primary:hover { background: var(--accent-h); }
        .tbtn.success   { background: var(--success); color: #fff; border-color: var(--success); }
        .tbtn.success:hover { background: #15803d; }

        .fname-wrap {
            display: flex; align-items: center; gap: 4px;
            background: var(--input-bg); padding: 3px 8px;
            border-radius: 5px; border: 1px solid var(--border);
        }
        .fname-wrap input {
            border: none; outline: none; font-size: 13px;
            width: 155px; background: transparent; font-weight: 500;
            color: var(--text);
        }

        .srch-wrap {
            display: flex; align-items: center; gap: 2px;
            background: var(--input-bg); padding: 2px 5px;
            border-radius: 5px; border: 1px solid var(--border);
        }
        .srch-wrap input {
            border: none; outline: none; font-size: 12px;
            width: 110px; background: transparent; color: var(--text);
        }
        .srch-counter { font-size: 11px; color: var(--text); opacity: 0.65; min-width: 48px; text-align: right; }
        .srch-counter.no-match { color: #e44; opacity: 1; }
        .srch-sep { width: 1px; height: 15px; background: var(--srch-sep); margin: 0 2px; }

        select {
            padding: 4px 5px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--input-bg);
            font-size: 12px; cursor: pointer; color: var(--text);
        }

        /* ── TABS ────────────────────────────────────────────────── */
        .tab-bar {
            background: var(--tab-bar-bg);
            display: flex;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: thin;
            flex-shrink: 0;
        }
        .tab {
            padding: 5px 10px;
            border-right: 1px solid var(--border);
            cursor: pointer;
            font-size: 12.5px;
            display: flex; align-items: center; gap: 5px;
            min-width: 90px; max-width: 180px;
            overflow: hidden;
            transition: background .12s;
            user-select: none; flex-shrink: 0;
            color: var(--text);
        }
        .tab:hover { background: var(--tab-hover); }
        .tab.active { background: var(--tab-active-bg); border-bottom: 2px solid var(--accent); font-weight: 600; }
        .tab.drag-over { background: var(--tab-drag-bg); }
        .tab-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .tab-name[contenteditable="true"] {
            outline: none;
            background: var(--editor-bg);
            border-radius: 2px;
            padding: 0 2px;
            white-space: nowrap;
            overflow: visible;
            min-width: 40px;
            cursor: text;
            box-shadow: 0 0 0 1.5px var(--accent);
        }
        .tab-dirty { color: #f59e0b; font-size: 9px; flex-shrink: 0; }
        .tab-close {
            width: 15px; height: 15px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; line-height: 1; opacity: .45; flex-shrink: 0;
        }
        .tab-close:hover { background: var(--tbtn-hover); opacity: 1; }

        /* ── MAIN CONTAINER ──────────────────────────────────────── */
        .main-container {
            flex: 1; display: flex; position: relative; overflow: hidden;
            background: var(--editor-bg);
        }

        /* Change gutter */
        #gutter-wrap {
            width: 5px; overflow: hidden;
            background: var(--ln-bg); flex-shrink: 0;
        }
        #gutter-inner {
            width: 5px; position: relative; min-height: 100%;
        }

        /* Line numbers */
        .line-numbers {
            /* 初期幅は2桁分(+余白)。updateLineNumbers()がJS側で必要に応じて拡張する */
            width: 34px;
            min-width: 34px;
            padding: 10px 4px 10px 0;
            background: var(--ln-bg);
            border-right: 1px solid var(--border);
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px; line-height: 1.5;
            color: var(--text);
            opacity: 0.55;
            user-select: none;
            overflow: hidden; white-space: pre;
            cursor: pointer;
            flex-shrink: 0;
            transition: width 0.1s;
        }

        /* Editor wrapper */
        .editor-wrapper { flex: 1; position: relative; overflow: auto; }

        /* ── INDENT GUIDES ────────────────────────────────────────
           A single container holds all vertical guide lines.
           Lines are injected by updateIndentGuides() in JS.
           ────────────────────────────────────────────────────────── */
        #indent-guides {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 4;
            display: none;      /* hidden until toggled */
            overflow: hidden;
        }
        /* Individual guide lines are <div> children, styled inline by JS */

        /* Current line highlight */
        #line-hl {
            position: absolute; left: 0; right: 0;
            background: var(--hl-line);
            pointer-events: none; z-index: 2;
        }

        /* Search match highlight overlay */
        #search-hl {
            position: absolute; top: 0; left: 0;
            pointer-events: none; z-index: 3;
        }

        #editor {
            position: relative; z-index: 5;
            width: 100%; min-height: 100%;
            padding: 10px;
            border: none; outline: none; resize: none;
            white-space: pre;
            background: transparent;
            line-height: 1.5;
            tab-size: 4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: var(--text);
            caret-color: var(--caret);
            display: block;
            overflow: hidden;
        }

        /* ── STATUS BAR ──────────────────────────────────────────── */
        .statusbar {
            background: linear-gradient(180deg, var(--statusbar-top), var(--statusbar-bot));
            border-top: 1px solid var(--border);
            padding: 2px 12px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11.5px; color: var(--text);
            height: 23px; flex-shrink: 0; user-select: none;
        }
        .sb-right { display: flex; }
        .sb-item  { padding: 0 9px; border-left: 1px solid var(--sb-border); }
        .sb-item:first-child { border-left: none; }
        .sb-item.click:hover { background: var(--tab-hover); cursor: pointer; }

        /* ── DROP ZONE ───────────────────────────────────────────── */
        #drop-zone {
            display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(37,99,235,.08);
            border: 3px dashed var(--accent);
            z-index: 8000; pointer-events: none;
            justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; color: var(--accent);
        }

        /* ── REGULAR MODAL ───────────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.5); z-index: 9000;
            justify-content: center; align-items: center;
        }
        .modal {
            background: var(--modal-bg); padding: 24px; border-radius: 10px;
            max-width: 420px; width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,.22);
            color: var(--text);
        }
        .modal h3 { margin-bottom: 10px; font-size: 15px; }
        .modal p  { color: var(--modal-text); font-size: 13.5px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

        /* ── HELP MODAL ──────────────────────────────────────────── */
        #help-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.55); z-index: 9100;
            justify-content: center; align-items: center;
        }
        .help-modal {
            background: var(--modal-bg); border-radius: 12px;
            width: min(680px, 96vw); max-height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,.28);
            overflow: hidden; color: var(--text);
        }
        .help-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .help-header h2 { font-size: 16px; font-weight: 700; }
        .help-close {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; cursor: pointer;
            font-size: 18px; color: var(--modal-text);
        }
        .help-close:hover { background: var(--tab-hover); }
        .help-body { overflow-y: auto; padding: 16px 20px; flex: 1; }
        .help-section { margin-bottom: 20px; }
        .help-section h3 {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; color: var(--help-h3-color); margin-bottom: 8px;
            padding-bottom: 4px; border-bottom: 1px solid var(--help-border);
        }
        .shortcut-row {
            display: flex; align-items: center;
            padding: 5px 0; border-bottom: 1px solid var(--help-border);
            gap: 12px;
        }
        .shortcut-row:last-child { border-bottom: none; }
        .sc-keys {
            display: flex; gap: 4px; flex-wrap: wrap;
            min-width: 200px; flex-shrink: 0;
        }
        .sc-key {
            background: var(--sc-key-bg); border: 1px solid var(--sc-key-border);
            border-radius: 4px; padding: 2px 6px;
            font-family: 'Courier New', monospace; font-size: 11px;
            color: var(--sc-key-text); white-space: nowrap;
            box-shadow: 0 1px 0 var(--sc-key-shadow);
        }
        .sc-desc { font-size: 12.5px; color: var(--text); }
        .gutter-legend {
            display: flex; gap: 12px; margin-top: 10px;
            padding: 8px 12px; background: var(--gutter-legend-bg);
            border-radius: 6px; flex-wrap: wrap;
        }
        .gl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--modal-text); }
        .gl-bar { width: 5px; height: 18px; border-radius: 2px; }
        .help-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            text-align: right; flex-shrink: 0;
        }

        /* Theme preview swatch in select */
        .theme-dot {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<!-- ── TOOLBAR ────────────────────────────────────────────────────────── -->
<div class="toolbar">

    <!-- ── ミニマム表示 ───────────────────────────────────────────── -->

    <!-- 新規・開く・保存 -->
    <div class="tgroup">
        <button class="tbtn" onclick="createNewTab()" title="新規タブ (Ctrl+N)">
            <i data-lucide="file-plus"></i>
        </button>
        <button class="tbtn" onclick="document.getElementById('fileInput').click()" title="ファイルを開く">
            <i data-lucide="folder-open"></i>
        </button>
        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" multiple>
        <!-- fileNameInput は非表示で保持（JS参照のため） -->
        <input type="text" id="fileNameInput" style="display:none">
        <button class="tbtn primary" onclick="saveFile()" title="保存 (Ctrl+S)">
            <i data-lucide="save"></i>
        </button>
    </div>

    <div class="tsep"></div>

    <!-- エンコード -->
    <div class="tgroup">
        <select id="encoding" onchange="changeEncoding()" style="width:100px">
            <option value="SJIS">ANSI(Shift_JIS)</option>
            <option value="UTF16LE">UTF-16 LE</option>
            <option value="UTF16BE">UTF-16 BE</option>
            <option value="UTF8" selected>UTF-8</option>
            <option value="UTF8BOM">UTF-8(BOM付)</option>
        </select>
    </div>

    <div class="tsep"></div>

    <!-- フォント種類・サイズ -->
    <div class="tgroup">
        <select id="fontFamily" onchange="updateStyle()" style="width:80px">
            <option value="'Courier New',Courier,monospace" selected>等幅</option>
            <option value="Meiryo,sans-serif">メイリオ</option>
            <option value="'Yu Gothic','游ゴシック',sans-serif">游ゴシック</option>
            <option value="'MS Mincho','ＭＳ 明朝',serif">MS 明朝</option>
            <option value="'MS Gothic','ＭＳ ゴシック',monospace">MS ゴシック</option>
        </select>
        <select id="fontSize" onchange="updateStyle()" style="width:46px">
            <option value="12px">12</option>
            <option value="14px" selected>14</option>
            <option value="16px">16</option>
            <option value="18px">18</option>
            <option value="20px">20</option>
        </select>
    </div>

    <div class="tsep"></div>

    <!-- 元に戻す・やり直し -->
    <div class="tgroup">
        <button class="tbtn" id="undoBtn" onclick="undo()" title="元に戻す (Ctrl+Z)">
            <i data-lucide="undo-2"></i>
        </button>
        <button class="tbtn" id="redoBtn" onclick="redo()" title="やり直し (Ctrl+Y)">
            <i data-lucide="redo-2"></i>
        </button>
    </div>

    <div class="tsep"></div>

    <!-- 折り返し -->
    <div class="tgroup">
        <button class="tbtn" id="wrapBtn" onclick="toggleWordWrap()" title="折り返し">
            <i data-lucide="wrap-text"></i>
        </button>
    </div>

    <div class="tsep"></div>

    <!-- インデントガイド -->
    <div class="tgroup">
        <button class="tbtn" id="guideBtn" onclick="toggleIndentGuides()" title="インデントガイド (4列毎)">
            <i data-lucide="ruler"></i>
        </button>
    </div>

    <!-- ── 拡張表示（display:contents で flex に直接参加） ────────── -->
    <div id="toolbar-ext">

        <div class="tsep"></div>

        <!-- 検索・置換 -->
        <div class="tgroup">
            <div class="srch-wrap">
                <i data-lucide="search" style="width:13px;height:13px;color:#bbb;flex-shrink:0"></i>
                <input type="text" id="searchInput" placeholder="検索..."
                       oninput="onSearchInput()" onkeydown="onSearchKeydown(event)">
                <button class="tbtn srch-clear-btn" id="srchClearBtn" onclick="clearSearch()"
                        title="クリア" style="display:none;padding:2px 3px;opacity:.6">×</button>
                <span class="srch-counter" id="srchCounter"></span>
                <div class="srch-sep"></div>
                <button class="tbtn" id="caseBtn"  onclick="toggleCase()"
                        title="大文字/小文字を区別 (Alt+C)"
                        style="padding:2px 5px;font-weight:bold;font-size:11px">Aa</button>
                <button class="tbtn" id="regexBtn" onclick="toggleRegex()"
                        title="正規表現 (Alt+R)"
                        style="padding:2px 5px;font-size:11px">.*</button>
                <button class="tbtn" onclick="searchPrev()" title="前へ (Shift+F3)" style="padding:2px 4px">
                    <i data-lucide="chevron-up"></i>
                </button>
                <button class="tbtn" onclick="searchNextBtn()" title="次へ (F3)" style="padding:2px 4px">
                    <i data-lucide="chevron-down"></i>
                </button>
            </div>
            <div class="srch-wrap" style="margin-left:4px">
                <i data-lucide="corner-down-right" style="width:13px;height:13px;color:#bbb;flex-shrink:0"></i>
                <input type="text" id="replaceInput" placeholder="置換..."
                       onkeydown="if(event.key==='Enter')replaceCurrent()">
                <button class="tbtn" onclick="replaceCurrent()" title="置換 (Enter in replace box)" style="padding:2px 4px">
                    <i data-lucide="check"></i>
                </button>
                <button class="tbtn" onclick="replaceAll()" title="一括置換" style="padding:2px 4px">
                    <i data-lucide="chevrons-right"></i>
                </button>
            </div>
        </div>

        <div class="tsep"></div>

        <!-- 数式整形・解除 -->
        <div class="tgroup">
            <button class="tbtn success" onclick="formatExcelFormula()" title="Excel数式を整形">
                <i data-lucide="list-tree"></i> 数式整形
            </button>
            <button class="tbtn" onclick="unformatExcelFormula()" title="整形を解除（1行にまとめる）">
                <i data-lucide="list"></i> 解除
            </button>
        </div>

        <div class="tsep"></div>

        <!-- 表示モード（テーマ） -->
        <div class="tgroup">
            <select id="themeSelect" onchange="applyThemeFromSelect()" title="テーマを切り替え" style="width:208px">
            </select>
        </div>

        <div class="tsep"></div>

        <!-- ヘルプ -->
        <div class="tgroup">
            <button class="tbtn" onclick="showHelp()" title="ショートカット一覧 (F1)">
                <i data-lucide="circle-help"></i>
            </button>
        </div>

    </div><!-- /#toolbar-ext -->

    <!-- 拡張トグルボタン（常に右端に表示） -->
    <button class="tbtn" id="extToggleBtn" onclick="toggleExtMenu()"
            title="拡張メニューを表示/非表示" style="margin-left:auto">
        <span id="extIconExpand"><i data-lucide="chevrons-right"></i></span>
        <span id="extIconCollapse" style="display:none"><i data-lucide="chevrons-left"></i></span>
    </button>

</div>

<!-- ── TAB BAR ───────────────────────────────────────────────────────── -->
<div class="tab-bar" id="tab-bar"></div>

<!-- ── MAIN AREA ─────────────────────────────────────────────────────── -->
<div class="main-container">
    <div id="drop-zone">ファイルをドロップして開く</div>

    <!-- Change gutter -->
    <div id="gutter-wrap"><div id="gutter-inner"></div></div>

    <!-- Line numbers -->
    <div class="line-numbers" id="line-numbers">1</div>

    <!-- Editor -->
    <div class="editor-wrapper" id="editor-wrapper">
        <div id="line-hl"></div>
        <!-- Search match highlight overlay -->
        <div id="search-hl"></div>
        <!-- Indent guides container (lines injected by JS) -->
        <div id="indent-guides"></div>
        <textarea id="editor" spellcheck="false"></textarea>
    </div>
</div>

<!-- ── STATUS BAR ────────────────────────────────────────────────────── -->
<div class="statusbar">
    <div id="sb-info">準備完了</div>
    <div class="sb-right">
        <div class="sb-item" id="sb-sel"></div>
        <div class="sb-item" id="sb-pos">行: 1, 列: 1</div>
        <div class="sb-item" id="sb-lines">全 1 行</div>
        <div class="sb-item" id="sb-chars">文字数: 0</div>
        <div class="sb-item click" id="sb-eol" onclick="cycleLineEnding()" title="クリックで改行コードを変換">LF</div>
        <div class="sb-item" id="sb-enc">UTF-8</div>
    </div>
</div>

<!-- ── REGULAR MODAL ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">確認</h3>
        <p  id="modal-body"></p>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<!-- ── HELP MODAL ────────────────────────────────────────────────────── -->

const editor          = document.getElementById('editor');

const MAX_HISTORY   = 100;
const AUTO_PAIR     = { '(':')', '[':']', '{':'}' };
const CLOSING_CHARS = new Set([')', ']', '}']);

let tabs          = [];
let activeTabId   = null;
let searchMatches = [];
let matchIndex    = -1;
let caseSensitive = false;
let useRegex      = false;
let guidesVisible  = false;  // 全タブ共通：インデントガイド表示

// 折り返しモード用の行数計測キャンバス（1度だけ生成して使い回す）
const _mc  = document.createElement('canvas');
const _mct = _mc.getContext('2d');

/* =====================================================================
   HELPERS
   ===================================================================== */

/** タブ文字を空白に展開する（canvas計測用） */
function expandTabs(str) {
    let result = '', col = 0;
    for (const ch of str) {
        if (ch === '\t') { const sp = 4 - (col % 4); result += ' '.repeat(sp); col += sp; }
        else { result += ch; col++; }
    }
    return result;
}

/**
 * 非折り返しモード時にエディタ textarea の幅をコンテンツに合わせて広げる。
 * editor-wrapper の overflow:auto が横スクロールバーを表示する。
 */
function syncEditorWidth() {
    const isWrap = globalWordWrap;
    if (isWrap) {
        editor.style.width = '100%';
        return;
    }
    _mct.font = getComputedStyle(editor).font;
    const lines = editor.value.split('\n');
    let maxW = 0;
    for (const line of lines) {
        const w = _mct.measureText(expandTabs(line)).width;
        if (w > maxW) maxW = w;
    }
    const wrapperW  = editorWrapper.clientWidth;
    const contentW  = Math.ceil(maxW) + 30; // 10px left pad + 20px margin
    editor.style.width = Math.max(wrapperW, contentW) + 'px';
}

/**
 * 検索ヒットをオーバーレイで描画する。
 * 全マッチを薄塗り、現在の選択マッチを濃く塗る。
 *
 * 差分更新 (#8):
 *   - マッチ自体が変化した場合 (buildMatches が走った): 全再構築
 *   - matchIndex のみ変化した場合: 旧/新カレントの div スタイルだけ書き換え
 */

// 差分更新用の状態
let _hlDivStore       = [];   // _hlDivStore[matchIdx] = [{div, normalCss, currentCss}, ...]
let _hlCacheKeyRender = '';   // 前回フル描画時の _matchCacheKey
let _hlLastMatchIndex = -2;   // 前回描画時の matchIndex

function renderSearchHighlights() {
    const overlay = document.getElementById('search-hl');
    if (!overlay) return;

    const q = document.getElementById('searchInput').value;
    if (!q || searchMatches.length === 0) {
        // マッチなし → 全クリア
        overlay.innerHTML = '';
        _hlDivStore = []; _hlCacheKeyRender = ''; _hlLastMatchIndex = -2;
        return;
    }

    const cs  = getComputedStyle(editor);
    _mct.font = cs.font;
    let lh = parseFloat(cs.lineHeight);
    if (!lh || isNaN(lh)) lh = parseFloat(cs.fontSize) * 1.5;

    // ── Fast path: マッチは同じで matchIndex だけ変わった場合 ──────────
    if (_matchCacheKey === _hlCacheKeyRender &&
        _hlDivStore.length === searchMatches.length &&
        matchIndex !== _hlLastMatchIndex) {

        // 前の current を normal スタイルに戻す
        const prev = _hlLastMatchIndex;
        if (prev >= 0 && prev < _hlDivStore.length) {
            _hlDivStore[prev].forEach(info => { info.div.style.cssText = info.normalCss; });
        }
        // 新しい current を current スタイルに変える
        if (matchIndex >= 0 && matchIndex < _hlDivStore.length) {
            _hlDivStore[matchIndex].forEach(info => { info.div.style.cssText = info.currentCss; });
        }
        _hlLastMatchIndex = matchIndex;
        return;
    }

    // ── Full rebuild: マッチが変化した場合 ───────────────────────────────
    overlay.innerHTML = '';
    _hlDivStore = [];
    _hlCacheKeyRender = _matchCacheKey;
    _hlLastMatchIndex = matchIndex;

    const pad  = 10; // editor の top/left padding
    const text = editor.value;
    const frag = document.createDocumentFragment();

    // テキスト全体の行頭オフセット配列を事前計算（高速化）
    const lineOffsets = [0];
    for (let i = 0; i < text.length; i++) {
        if (text[i] === '\n') lineOffsets.push(i + 1);
    }

    searchMatches.forEach((m, idx) => {
        const isCurrent = idx === matchIndex;

        // マッチが複数行にまたがる場合にも対応
        const matchText  = text.substring(m.start, m.end);
        const matchLines = matchText.split('\n');
        let charPos = m.start;
        const divInfos = [];

        matchLines.forEach(mLine => {
            // 行インデックスを lineOffsets で正確に求める
            let lineIdx = 0;
            for (let i = lineOffsets.length - 1; i >= 0; i--) {
                if (lineOffsets[i] <= charPos) { lineIdx = i; break; }
            }
            const lineStart  = lineOffsets[lineIdx];
            const linePrefix = text.substring(lineStart, charPos);

            const x = pad + _mct.measureText(expandTabs(linePrefix)).width;
            const y = lineIdx * lh + pad;
            const w = Math.max(_mct.measureText(expandTabs(mLine)).width, 3);

            // normal / current 両方の cssText を保持しておく（fast path で使い回す）
            const normalCss =
                `position:absolute;top:${y + 1}px;left:${x}px;` +
                `width:${w}px;height:${lh - 2}px;` +
                `background:transparent;border:1px solid rgba(255,180,0,0.7);` +
                `pointer-events:none;border-radius:2px;box-sizing:border-box;`;
            const currentCss =
                `position:absolute;top:${y}px;left:${x}px;` +
                `width:${w}px;height:${lh}px;` +
                `background:rgba(255,140,0,0.55);pointer-events:none;border-radius:2px;`;

            const div = document.createElement('div');
            div.style.cssText = isCurrent ? currentCss : normalCss;
            divInfos.push({ div, normalCss, currentCss });
            frag.appendChild(div);
            charPos += mLine.length + 1; // +1 for '\n'
        });

        _hlDivStore.push(divInfos);
    });

    overlay.appendChild(frag);
}

/** Apply a named theme by setting CSS custom properties on <html> */
function applyTheme(name) {
    const t = THEMES[name];
    if (!t) return;
    const root = document.documentElement;
    // Use the first theme's keys as the canonical property list
    Object.keys(Object.values(THEMES)[0]).forEach(k => root.style.removeProperty(k));
    Object.entries(t).forEach(([k, v]) => root.style.setProperty(k, v));
    try { localStorage.setItem('editorTheme', name); } catch (_) {}
}

function applyThemeFromSelect() {
    const name = document.getElementById('themeSelect').value;
    applyTheme(name);
}

/** Populate the theme <select> and restore last-used theme */
function initThemeSelect() {
    const sel     = document.getElementById('themeSelect');
    const saved   = (() => { try { return localStorage.getItem('editorTheme'); } catch(_){return null;} })();
    const current = (saved && THEMES[saved]) ? saved : 'GitHub Light';

    Object.keys(THEME_META).forEach(name => {
        const meta = THEME_META[name];
        const opt  = document.createElement('option');
        opt.value    = name;
        opt.selected = name === current;
        // Always use the theme's own fg/swatch colors so text is readable
        // regardless of the OS or browser dark-mode.
        opt.style.backgroundColor = meta.swatch;
        opt.style.color           = meta.fg;
        // Label: swatch square + name + description
        opt.textContent = `■ ${name}（${meta.desc}）`;
        sel.appendChild(opt);
    });

    applyTheme(current);
}

/* =====================================================================
   TAB MANAGEMENT
   ===================================================================== */
function createNewTab(name = 'untitled.txt', content = '', encoding = 'UTF8', raw = null) {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    tabs.push({
        id, name, content, encoding, rawData: raw,
        baselineContent: content,
        history: [{ value: content, ss: 0, se: 0 }],
        histIdx: 0, scrollTop: 0,
        isDirty: false
    });
    switchTab(id);
}

function renderTabs() {
    tabBar.innerHTML = '';
    tabs.forEach(tab => {
        const div = document.createElement('div');
        div.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
        div.dataset.tabId = tab.id;
        div.draggable = true;
        div.addEventListener('dragstart', onTabDragStart);
        div.addEventListener('dragover',  onTabDragOver);
        div.addEventListener('dragleave', onTabDragLeave);
        div.addEventListener('drop',      onTabDrop);
        div.addEventListener('dragend',   onTabDragEnd);
        div.onclick = e => {
            // nameEl が編集中のときはタブ切り替えを抑止
            if (nameEl.contentEditable === 'true') return;
            switchTab(tab.id);
        };

        const nameEl  = document.createElement('span');
        nameEl.className = 'tab-name';
        nameEl.textContent = tab.name;
        nameEl.title = tab.name;

        // ── ダブルクリックでインライン編集 (#11) ──────────────────────
        nameEl.addEventListener('dblclick', e => {
            e.stopPropagation();
            // まずこのタブをアクティブにする
            if (activeTabId !== tab.id) switchTab(tab.id);

            nameEl.contentEditable = 'true';
            nameEl.focus();
            // テキストを全選択
            const range = document.createRange();
            range.selectNodeContents(nameEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            // 編集中はドラッグを無効化
            div.draggable = false;

            const commit = () => {
                const newName = nameEl.textContent.trim() || tab.name;
                nameEl.contentEditable = 'false';
                div.draggable = true;
                const t = getTab(tab.id);
                if (t && newName !== t.name) {
                    t.name = newName;
                    fileNameInput.value = newName;
                    renderTabs();
                } else {
                    // 変更なし：表示だけ元に戻す
                    nameEl.textContent = tab.name;
                }
            };
            const cancel = () => {
                nameEl.contentEditable = 'false';
                div.draggable = true;
                nameEl.textContent = tab.name;
            };

            nameEl.addEventListener('keydown', ev => {
                if (ev.key === 'Enter')  { ev.preventDefault(); nameEl.blur(); }
                if (ev.key === 'Escape') { ev.preventDefault(); cancel(); }
                ev.stopPropagation(); // エディタのキーハンドラに流さない
            }, { once: false, _isRename: true });

            nameEl.addEventListener('blur', commit, { once: true });
        });

        const dirtyEl = document.createElement('span');
        dirtyEl.className = 'tab-dirty';
        dirtyEl.textContent = tab.isDirty ? '●' : '';
        dirtyEl.title = tab.isDirty ? '未保存の変更あり' : '';

        const closeEl = document.createElement('div');
        closeEl.className = 'tab-close';
        closeEl.textContent = '×';
        closeEl.title = '閉じる';
        closeEl.onclick = e => { e.stopPropagation(); closeTab(tab.id); };

        div.appendChild(nameEl);
        div.appendChild(dirtyEl);
        div.appendChild(closeEl);
        tabBar.appendChild(div);
    });
}

/* Tab drag-and-drop reorder */
function onTabDragStart(e) {
    draggedTabId = e.currentTarget.dataset.tabId;
    e.dataTransfer.effectAllowed = 'move';
}
function onTabDragOver(e) {
    if (!draggedTabId) return;
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
}
function onTabDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onTabDrop(e) {
    e.currentTarget.classList.remove('drag-over');
    if (!draggedTabId) return;
    e.preventDefault(); e.stopPropagation();
    const targetId = e.currentTarget.dataset.tabId;
    if (draggedTabId === targetId) { draggedTabId = null; return; }
    const fi = tabs.findIndex(t => t.id === draggedTabId);
    const ti = tabs.findIndex(t => t.id === targetId);
    const [moved] = tabs.splice(fi, 1);
    tabs.splice(ti, 0, moved);
    draggedTabId = null;
    renderTabs();
}
function onTabDragEnd() {
    draggedTabId = null;
    document.querySelectorAll('.tab.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function switchTab(id) {
    if (activeTabId === id) return;
    if (activeTabId) {
        const cur = getTab(activeTabId);
        if (cur) {
            cur.content   = editor.value;
            cur.scrollTop = editorWrapper.scrollTop;
            cur.encoding  = document.getElementById('encoding').value;
        }
    }
    activeTabId = id;
    const tab = getTab(id);
    if (!tab) return;
    editor.value = tab.content;
    fileNameInput.value = tab.name;
    document.getElementById('encoding').value = tab.encoding;
    updateEncodingDisplay(tab.encoding);
    renderTabs();
    // アクティブタブが視野外の場合は自動スクロールして見えるようにする
    requestAnimationFrame(() => {
        const activeEl = tabBar.querySelector('.tab.active');
        if (activeEl) activeEl.scrollIntoView({ inline: 'nearest', block: 'nearest' });
    });
    lastLineCount = 0;
    updateLineNumbers();
    updateStatus();
    updateUndoButtons();
    updateGutter();
    requestAnimationFrame(() => {
        editorWrapper.scrollTop = tab.scrollTop;
        syncEditorWidth();
        renderSearchHighlights();
        if (guidesVisible) updateIndentGuides();
    });
}

function closeTab(id) {
    const tab = getTab(id);
    if (tab && tab.isDirty) {
        // 未保存の場合は3択ダイアログを表示
        showDirtyCloseModal(tab.name,
            () => _doCloseTab(id),          // 閉じる（破棄）
            async () => {                   // 保存してから閉じる
                const prev = activeTabId;
                if (activeTabId !== id) switchTab(id);
                const saved = await saveFile();
                if (!saved) {
                    // キャンセル or エラー → 閉じない。元のタブに戻す
                    if (activeTabId !== prev && prev && getTab(prev)) switchTab(prev);
                    return;
                }
                if (activeTabId !== prev && prev && getTab(prev)) switchTab(prev);
                _doCloseTab(id);
            }
        );
        return;
    }
    _doCloseTab(id);
}

function _doCloseTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (tabs.length === 1) {
        const t = tabs[0];
        t.content = ''; t.name = 'untitled.txt';
        t.baselineContent = ''; t.rawData = null;
        t.isDirty = false; t.wordWrap = false;
        t.history = [{ value: '', ss: 0, se: 0 }]; t.histIdx = 0;
        editor.value = '';
        fileNameInput.value = 'untitled.txt';
        editor.style.whiteSpace = 'pre';
        document.getElementById('wrapBtn').classList.remove('active');
        lastLineCount = 0;
        updateLineNumbers(); updateStatus(); updateUndoButtons();
        updateGutter(); renderTabs();
        return;
    }
    tabs = tabs.filter(t => t.id !== id);
    if (activeTabId === id) {
        activeTabId = null;
        switchTab(tabs[Math.max(0, idx - 1)].id);
    } else {
        renderTabs();
    }
}

function updateTabNameFromInput(name) {
    const tab = getTab(activeTabId);
    if (tab) { tab.name = name || 'untitled.txt'; renderTabs(); }
}

function markDirty() {
    const tab = getTab(activeTabId);
    if (tab && !tab.isDirty) { tab.isDirty = true; renderTabs(); }
}

function getTab(id) { return tabs.find(t => t.id === id) || null; }

/* =====================================================================
   HISTORY
   ===================================================================== */
function saveToHistory() {
    const tab = getTab(activeTabId);
    if (!tab) return;
    const state = { value: editor.value, ss: editor.selectionStart, se: editor.selectionEnd };
    const cur   = tab.history[tab.histIdx];
    if (cur && cur.value === state.value) return;
    tab.history.splice(tab.histIdx + 1);
    tab.history.push(state);
    if (tab.history.length > MAX_HISTORY) tab.history.shift();
    tab.histIdx = tab.history.length - 1;
    updateUndoButtons();
}

function undo() {
    const tab = getTab(activeTabId);
    if (tab && tab.histIdx > 0) { tab.histIdx--; applyHistory(tab); }
}

function redo() {
    const tab = getTab(activeTabId);
    if (tab && tab.histIdx < tab.history.length - 1) { tab.histIdx++; applyHistory(tab); }
}

function applyHistory(tab) {
    const s           = tab.history[tab.histIdx];
    const savedScroll = editorWrapper.scrollTop;
    editor.value      = s.value;
    editor.setSelectionRange(s.ss, s.se);
    requestAnimationFrame(() => { editorWrapper.scrollTop = savedScroll; });
    updateLineNumbers(); updateStatus(); updateUndoButtons();
    scheduleGutterUpdate();
}

function updateUndoButtons() {
    const tab = getTab(activeTabId);
    undoBtn.disabled = !tab || tab.histIdx <= 0;
    redoBtn.disabled = !tab || tab.histIdx >= tab.history.length - 1;
}

/* =====================================================================
   SEARCH
   ===================================================================== */
// buildMatches のキャッシュキー：テキスト・クエリ・オプションが前回と同じなら再計算不要
let _matchCacheKey = '';

function buildMatches() {
    const q    = document.getElementById('searchInput').value;
    const text = editor.value;
    // クエリが空のときは常にリセット（キャッシュ対象外）
    if (!q) {
        searchMatches = []; matchIndex = -1;
        _matchCacheKey = '';
        refreshCounter(); renderSearchHighlights(); return;
    }
    const key = `${q}\0${caseSensitive}\0${useRegex}\0${text}`;
    if (key === _matchCacheKey) return;   // 変化なし → 再計算スキップ
    _matchCacheKey = key;
    searchMatches  = [];
    try {
        const flags   = 'g' + (caseSensitive ? '' : 'i');
        const pattern = useRegex ? q : q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(pattern, flags);
        let m;
        while ((m = re.exec(text)) !== null) {
            searchMatches.push({ start: m.index, end: m.index + m[0].length });
            if (re.lastIndex === m.index) re.lastIndex++;
        }
    } catch (_) {}
}

function findNearestMatch() {
    if (searchMatches.length === 0) { matchIndex = -1; return; }
    const pos = editor.selectionStart;
    const i   = searchMatches.findIndex(m => m.start >= pos);
    matchIndex = i === -1 ? 0 : i;
}

function refreshCounter() {
    const el = document.getElementById('srchCounter');
    const q  = document.getElementById('searchInput').value;
    if (!q)                         { el.textContent = '';       el.className = 'srch-counter'; return; }
    if (searchMatches.length === 0) { el.textContent = '0 件'; el.className = 'srch-counter no-match'; return; }
    el.className    = 'srch-counter';
    el.textContent  = `${matchIndex + 1} / ${searchMatches.length}`;
}

function jumpToMatch(keepFocus = false) {
    if (matchIndex < 0 || matchIndex >= searchMatches.length) { refreshCounter(); renderSearchHighlights(); return; }
    const m = searchMatches[matchIndex];
    if (!keepFocus) editor.focus();
    editor.setSelectionRange(m.start, m.end);
    scrollToChar(m.start);
    refreshCounter();
    renderSearchHighlights();
}

function scrollToChar(charIdx) {
    const before  = editor.value.substring(0, charIdx);
    const lineIdx = (before.match(/\n/g) || []).length;
    const lh      = parseFloat(getComputedStyle(editor).lineHeight);
    editorWrapper.scrollTop = Math.max(0, lineIdx * lh + 10 - editorWrapper.clientHeight / 2);
}

function onSearchInput() {
    buildMatches(); findNearestMatch(); jumpToMatch(true);
    document.getElementById('srchClearBtn').style.display =
        document.getElementById('searchInput').value ? '' : 'none';
}

function clearSearch() {
    const inp = document.getElementById('searchInput');
    inp.value = '';
    onSearchInput();
    inp.focus();
}

function onSearchKeydown(e) {
    if (e.key === 'Enter')  { e.preventDefault(); e.shiftKey ? searchPrev() : searchNextBtn(); }
    if (e.key === 'Escape') {
        // 検索ボックスをクリアしてハイライトも消してからエディタに戻る
        clearSearch();
        editor.focus();
    }
}

function searchNextBtn() {
    buildMatches();
    if (searchMatches.length === 0) { refreshCounter(); return; }
    matchIndex = matchIndex < 0 ? 0 : (matchIndex + 1) % searchMatches.length;
    jumpToMatch(false);
}

function searchPrev() {
    buildMatches();
    if (searchMatches.length === 0) { refreshCounter(); return; }
    matchIndex = matchIndex < 0 ? searchMatches.length - 1
               : (matchIndex - 1 + searchMatches.length) % searchMatches.length;
    jumpToMatch(false);
}

function toggleCase() {
    caseSensitive = !caseSensitive;
    document.getElementById('caseBtn').classList.toggle('active', caseSensitive);
    buildMatches(); findNearestMatch(); jumpToMatch(true);
}

function toggleRegex() {
    useRegex = !useRegex;
    document.getElementById('regexBtn').classList.toggle('active', useRegex);
    buildMatches(); findNearestMatch(); jumpToMatch(true);
}

function replaceCurrent() {
    const q   = document.getElementById('searchInput').value;
    const rep = document.getElementById('replaceInput').value;
    if (!q) return;
    buildMatches();
    if (searchMatches.length === 0) return;
    if (matchIndex < 0) findNearestMatch();
    const m = searchMatches[matchIndex];
    if (editor.selectionStart === m.start && editor.selectionEnd === m.end) {
        editor.setRangeText(rep, m.start, m.end, 'end');
        markDirty(); saveToHistory();
        buildMatches();
        matchIndex = Math.min(matchIndex, searchMatches.length - 1);
        jumpToMatch(false);
    } else {
        editor.setSelectionRange(m.start, m.end);
        scrollToChar(m.start); refreshCounter();
    }
    updateLineNumbers(); updateStatus();
}

function replaceAll() {
    const q   = document.getElementById('searchInput').value;
    const rep = document.getElementById('replaceInput').value;
    if (!q) return;
    buildMatches();
    if (searchMatches.length === 0) return;
    const count = searchMatches.length;
    let text = editor.value;
    for (let i = searchMatches.length - 1; i >= 0; i--) {
        const m = searchMatches[i];
        text = text.substring(0, m.start) + rep + text.substring(m.end);
    }
    editor.value = text;
    markDirty(); saveToHistory();
    buildMatches(); matchIndex = -1; refreshCounter();
    updateLineNumbers(); updateStatus(); scheduleGutterUpdate();
    showAlertModal('置換完了', `${count} 箇所の置換を行いました。`);
}

/* =====================================================================
   CHANGE GUTTER  (per-line modified/added indicator)
   ===================================================================== */
// Map によるカウント方式で O(n) に改善（最適化 #7）
function simScore(a, b) {
    if (a === b) return 1;
    const ta = a.trim(), tb = b.trim();
    if (!ta && !tb) return 1;
    if (!ta || !tb) return 0;
    const freq = new Map();
    for (const c of tb) freq.set(c, (freq.get(c) || 0) + 1);
    let matches = 0;
    for (const c of ta) {
        const n = freq.get(c);
        if (n > 0) { matches++; freq.set(c, n - 1); }
    }
    return matches / Math.max(ta.length, tb.length);
}

function computeLineStatus(baseLines, curLines) {
    const m = baseLines.length, n = curLines.length;
    if (m === 0) return new Array(n).fill(n > 0 ? 'added' : 'unchanged');
    if (n === 0) return [];
    if (m > 1500 || n > 1500) {
        return curLines.map((line, i) =>
            i >= m ? 'added' : line === baseLines[i] ? 'unchanged' : 'modified'
        );
    }
    const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
    for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
            dp[i][j] = baseLines[i-1] === curLines[j-1]
                ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);

    const curInLCS  = new Array(n).fill(false);
    const baseInLCS = new Array(m).fill(false);
    let i = m, j = n;
    while (i > 0 && j > 0) {
        if (baseLines[i-1] === curLines[j-1]) {
            curInLCS[j-1] = true; baseInLCS[i-1] = true; i--; j--;
        } else if (dp[i-1][j] >= dp[i][j-1]) { i--; } else { j--; }
    }
    const deletedBase = baseLines
        .map((line, bi) => ({ bi, line }))
        .filter(({ bi }) => !baseInLCS[bi]);

    return curLines.map((curLine, ci) => {
        if (curInLCS[ci]) return 'unchanged';
        for (const { bi, line } of deletedBase)
            if (Math.abs(bi - ci) <= 4 && simScore(line, curLine) > 0.38) return 'modified';
        return 'added';
    });
}

function scheduleGutterUpdate() {
    clearTimeout(gutterTimer);
    gutterTimer = setTimeout(updateGutter, 700);
}

function updateGutter() {
    const tab = getTab(activeTabId);
    if (!tab) { gutterInner.innerHTML = ''; return; }
    const baseline = tab.baselineContent ?? '';   // null/undefined → ''
    const current  = editor.value;
    // FIX: was `if (!baseline || ...)` — empty string '' is falsy,
    // so a file opened as empty would never show gutter marks.
    // Now we only skip when content is truly identical.
    if (baseline === current) {
        gutterInner.innerHTML = '';
        gutterInner.style.height = '0';
        return;
    }
    const baseLines = baseline.split(/\r?\n/);
    const curLines  = current.split(/\r?\n/);
    const status    = computeLineStatus(baseLines, curLines);
    const lh        = parseFloat(getComputedStyle(editor).lineHeight);
    const totalH    = curLines.length * lh + 20;
    gutterInner.style.height   = totalH + 'px';
    gutterInner.style.position = 'relative';
    let html = '';
    let ci = 0;
    while (ci < status.length) {
        const s = status[ci]; let end = ci;
        while (end < status.length && status[end] === s) end++;
        if (s !== 'unchanged') {
            const top = 10 + ci * lh, h = (end - ci) * lh;
            const bg  = s === 'added' ? '#22c55e' : '#f59e0b';
            const tip = s === 'added' ? `追加された行 (${ci+1}–${end}行)` : `変更された行 (${ci+1}–${end}行)`;
            html += `<div title="${tip}" style="position:absolute;top:${top}px;left:0;width:100%;height:${h}px;background:${bg};border-radius:0 2px 2px 0;opacity:0.85;cursor:default"></div>`;
        }
        ci = end;
    }
    gutterInner.innerHTML = html;
}

/* =====================================================================
   LINE NUMBERS  (with wrap-aware Method B)
   ===================================================================== */
function getVisualRowCount(line, availWidth) {
    if (line === '') return 1;
    let expanded = '', col = 0;
    for (const ch of line) {
        if (ch === '\t') { const sp = 4 - (col % 4); expanded += ' '.repeat(sp); col += sp; }
        else             { expanded += ch; col++; }
    }
    const w = _mct.measureText(expanded).width;
    return Math.max(1, Math.ceil(w / availWidth));
}

function renderWrappedLineNumbers(logicalLines) {
    _mct.font   = getComputedStyle(editor).font;
    const avail = Math.max(1, editorWrapper.clientWidth - 20);
    let ln = '';
    for (let i = 0; i < logicalLines.length; i++) {
        const rows = getVisualRowCount(logicalLines[i], avail);
        ln += (i + 1) + '\n';
        for (let r = 1; r < rows; r++) ln += '\n';
    }
    lineNumbers.textContent = ln;
    lastLineCount = -1;
}

function updateLineNumbers() {
    if (editorWrapper.clientHeight === 0) {
        requestAnimationFrame(updateLineNumbers);
        return;
    }
    const text      = editor.value;
    const lineCount = (text.match(/\n/g) || []).length + 1;
    const tab       = getTab(activeTabId);
    const isWrap    = globalWordWrap;

    // ── 桁数に応じて行番号エリアの幅を自動調整 ──────────────────────
    // 最低2桁分を確保。必要に応じて1桁増えるごとに拡張。
    // 1桁=約9px(等幅14px)、余白(右4px+左余裕4px)=8px、最低2桁=26px+8=34px
    const digits   = String(lineCount).length;
    const minDigits = Math.max(2, digits);
    // 文字幅はcanvasで実測（フォント変更時も正確）
    _mct.font = getComputedStyle(lineNumbers).font;
    const charW  = _mct.measureText('0').width;
    const newW   = Math.ceil(minDigits * charW) + 12; // 12px = 左右余白合計
    if (parseInt(lineNumbers.style.width) !== newW) {
        lineNumbers.style.width    = newW + 'px';
        lineNumbers.style.minWidth = newW + 'px';
    }
    // ────────────────────────────────────────────────────────────────

    if (isWrap) {
        renderWrappedLineNumbers(text.split('\n'));
        const saved = editorWrapper.scrollTop;
        editor.style.height = 'auto';
        editor.style.height = Math.max(editorWrapper.clientHeight, editor.scrollHeight) + 'px';
        editorWrapper.scrollTop = saved;
    } else {
        if (lineCount !== lastLineCount) {
            lastLineCount = lineCount;
            let ln = '';
            for (let i = 1; i <= lineCount; i++) ln += i + '\n';
            lineNumbers.textContent = ln;
        }
        const lh     = parseFloat(getComputedStyle(editor).lineHeight);
        const needed = Math.max(editorWrapper.clientHeight, lineCount * lh + 20);
        if (Math.abs((parseInt(editor.style.height) || 0) - needed) > 1)
            editor.style.height = needed + 'px';
    }
}

/* =====================================================================
   STATUS BAR
   ===================================================================== */
function updateStatus() {
    const text   = editor.value;
    const ss     = editor.selectionStart;
    const se     = editor.selectionEnd;
    const before = text.substring(0, ss);

    // split を1回ずつ使い、正規表現の繰り返し実行を廃止（最適化 #5）
    const beforeLines = before.split('\n');
    const lineNum = beforeLines.length;
    const col     = beforeLines[beforeLines.length - 1].length + 1;
    const total   = text.split('\n').length;

    document.getElementById('sb-pos').textContent   = `行: ${lineNum}, 列: ${col}`;
    document.getElementById('sb-lines').textContent = `全 ${total} 行`;
    document.getElementById('sb-chars').textContent = `文字数: ${[...text].length}`;

    const selEl = document.getElementById('sb-sel');
    if (ss !== se) {
        const selText  = text.substring(ss, se);
        const selLen   = [...selText].length;
        const selLines = selText.split('\n').length;
        selEl.textContent = `選択: ${selLen}文字 (${selLines}行)`;
    } else { selEl.textContent = ''; }

    const eolEl = document.getElementById('sb-eol');
    eolEl.textContent = text.includes('\r\n') ? 'CRLF' : text.includes('\r') ? 'CR' : 'LF';

    const lh = parseFloat(getComputedStyle(editor).lineHeight);
    lineHl.style.top    = ((lineNum - 1) * lh + 10) + 'px';
    lineHl.style.height = lh + 'px';
}

function cycleLineEnding() {
    const cur  = document.getElementById('sb-eol').textContent;
    let text   = editor.value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    if (cur === 'LF') text = text.replace(/\n/g, '\r\n');
    editor.value = text;
    markDirty(); saveToHistory(); updateLineNumbers(); updateStatus();
}

/* ── INDENT GUIDES ────────────────────────────────────────────────────
   Draws 1px vertical lines at every 4-character column boundary.
   Lines are absolutely positioned in #indent-guides (z-index 3).
   We draw enough columns to cover the widest possible editor width.
   ────────────────────────────────────────────────────────────────── */
function toggleIndentGuides() {
    guidesVisible = !guidesVisible;
    document.getElementById('guideBtn').classList.toggle('active', guidesVisible);
    indentGuidesEl.style.display = guidesVisible ? 'block' : 'none';
    if (guidesVisible) updateIndentGuides();
}

let _lastGuideWidth = 0;   // 幅変化なければ再描画をスキップ（最適化 #9）

function updateIndentGuides() {
    if (!guidesVisible) return;

    _mct.font = getComputedStyle(editor).font;
    const cw4     = _mct.measureText('    ').width;
    const pad     = 10;
    const edW     = editorWrapper.scrollWidth || editorWrapper.clientWidth;

    // 幅が前回と同じなら再描画不要
    if (edW === _lastGuideWidth) return;
    _lastGuideWidth = edW;

    const maxCols = Math.ceil((edW - pad) / cw4) + 2;

    let html = '';
    for (let col = 1; col <= maxCols; col++) {
        const x = Math.round(pad + col * cw4);
        html += `<div style="position:absolute;top:0;bottom:0;left:${x}px;width:0;border-left:1px dashed var(--indent-guide)"></div>`;
    }
    indentGuidesEl.innerHTML = html;
}

/* =====================================================================
   EXCEL FORMULA TOOLS
   選択範囲がある場合はその範囲のみ処理。
   選択なし（ss === se）の場合はテキスト全体を処理。
   ===================================================================== */
function _processFormula(formula) {
    // 整形ロジック本体（文字列→文字列）
    // ・最外層（depth=1）のカンマのみ改行＋インデント
    // ・ネスト内（depth>=2）のカンマはスペース区切りで1行維持
    // ・{} 配列もネスト深さとしてカウント
    let result = '', inStr = false, curLen = 0, lastTok = '';
    const stack = []; // { pos, isLET, argCount, type:'paren'|'brace' }
    const clean = formula.replace(/\s+/g, ' ');
    for (const ch of clean) {
        if (ch === '"') { inStr = !inStr; result += ch; curLen++; continue; }
        if (inStr)      { result += ch; curLen++; continue; }
        if (ch === '(') {
            result += ch; curLen++;
            stack.push({ pos: curLen, isLET: lastTok.toUpperCase() === 'LET', argCount: 0, type: 'paren' });
            lastTok = '';
        } else if (ch === ')') {
            stack.pop(); result += ch; curLen++; lastTok = '';
        } else if (ch === '{') {
            result += ch; curLen++;
            stack.push({ pos: curLen, isLET: false, argCount: 0, type: 'brace' });
            lastTok = '';
        } else if (ch === '}') {
            stack.pop(); result += ch; curLen++; lastTok = '';
        } else if (ch === ',') {
            const ctx = stack[stack.length - 1];
            if (ctx && stack.length === 1) {
                // 最外層のみ改行（LETはペア内カンマをスペース区切りで同行に保つ）
                ctx.argCount++;
                if (ctx.isLET && ctx.argCount % 2 !== 0) {
                    result += ch + ' '; curLen += 2;
                } else {
                    result += ch + '\n' + ' '.repeat(ctx.pos); curLen = ctx.pos;
                }
            } else {
                // ネスト内はカンマ+スペースで1行
                result += ch + ' '; curLen += 2;
            }
            lastTok = '';
        } else if (ch === ' ') {
            if (curLen > 0 && !result.endsWith('\n') && !result.endsWith(' ')) { result += ' '; curLen++; }
        } else {
            result += ch; curLen++;
            if (/[A-Za-z0-9_]/.test(ch)) lastTok += ch; else lastTok = '';
        }
    }
    return result;
}

function _unprocessFormula(formula) {
    // 解除ロジック本体（文字列→文字列）
    let result = '', inStr = false;
    for (const ch of formula) {
        if (ch === '"') { inStr = !inStr; result += ch; continue; }
        if (inStr)      { result += ch; continue; }
        if (ch === '\n' || ch === '\r') continue;
        result += ch;
    }
    return result.replace(/\s+/g, ' ').replace(/,\s*/g, ',').trim();
}

function formatExcelFormula() {
    const ss = editor.selectionStart, se = editor.selectionEnd;
    if (ss === se) {
        // 選択なし → 全体
        const formula = editor.value.trim();
        if (!formula) return;
        editor.value = _processFormula(formula);
    } else {
        // 選択あり → 選択範囲のみ
        const sel = editor.value.substring(ss, se).trim();
        if (!sel) return;
        const processed = _processFormula(sel);
        editor.setRangeText(processed, ss, se, 'select');
    }
    markDirty(); saveToHistory(); lastLineCount = 0; updateLineNumbers(); updateStatus();
    scheduleGutterUpdate();
}

function unformatExcelFormula() {
    const ss = editor.selectionStart, se = editor.selectionEnd;
    if (ss === se) {
        // 選択なし → 全体
        const formula = editor.value;
        if (!formula) return;
        editor.value = _unprocessFormula(formula);
    } else {
        // 選択あり → 選択範囲のみ
        const sel = editor.value.substring(ss, se);
        if (!sel) return;
        const processed = _unprocessFormula(sel);
        editor.setRangeText(processed, ss, se, 'select');
    }
    markDirty(); saveToHistory(); lastLineCount = 0; updateLineNumbers(); updateStatus();
    scheduleGutterUpdate();
}

/* =====================================================================
   EDITOR KEYBOARD HANDLING
   ===================================================================== */
editor.addEventListener('keydown', e => {
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    const text  = editor.value;

    /* Tab / Shift+Tab */
    if (e.key === 'Tab') {
        e.preventDefault();
        if (start === end) {
            if (e.shiftKey) {
                // カーソル位置のみ：現在行の先頭インデントを1段除去
                const lineStart = text.lastIndexOf('\n', start - 1) + 1;
                const lineEnd   = text.indexOf('\n', start);
                const lineEndPos = lineEnd === -1 ? text.length : lineEnd;
                const line      = text.substring(lineStart, lineEndPos);
                let newLine, removed;
                if (line.startsWith('\t'))   { newLine = line.slice(1); removed = 1; }
                else if (line.startsWith('    ')) { newLine = line.slice(4); removed = 4; }
                else if (line.startsWith('   '))  { newLine = line.slice(3); removed = 3; }
                else if (line.startsWith('  '))   { newLine = line.slice(2); removed = 2; }
                else if (line.startsWith(' '))    { newLine = line.slice(1); removed = 1; }
                else { newLine = line; removed = 0; }
                if (removed > 0) {
                    editor.setRangeText(newLine, lineStart, lineEndPos, 'preserve');
                    editor.setSelectionRange(Math.max(lineStart, start - removed), Math.max(lineStart, start - removed));
                }
            } else {
                editor.setRangeText('\t', start, end, 'end');
            }
        } else {
            const blockStart = text.lastIndexOf('\n', start - 1) + 1;
            const blockEndNL = text.indexOf('\n', end - 1);
            const blockEnd   = blockEndNL === -1 ? text.length : blockEndNL;
            const lines      = text.substring(blockStart, blockEnd).split('\n');
            let newBlock;
            if (e.shiftKey) {
                newBlock = lines.map(l => {
                    if (l.startsWith('\t'))   return l.slice(1);
                    if (l.startsWith('    ')) return l.slice(4);
                    if (l.startsWith('   '))  return l.slice(3);
                    if (l.startsWith('  '))   return l.slice(2);
                    if (l.startsWith(' '))    return l.slice(1);
                    return l;
                }).join('\n');
            } else {
                newBlock = lines.map(l => '\t' + l).join('\n');
            }
            editor.setRangeText(newBlock, blockStart, blockEnd, 'preserve');
            editor.setSelectionRange(blockStart, blockStart + newBlock.length);
        }
        markDirty(); saveToHistory(); updateLineNumbers(); updateStatus();
        return;
    }

    /* Home: smart jump */
    if (e.key === 'Home' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        const lineStart   = text.lastIndexOf('\n', start - 1) + 1;
        const lineContent = text.substring(lineStart);
        const firstNS     = lineContent.search(/\S/);
        const smartPos    = firstNS === -1 ? lineStart : lineStart + firstNS;
        const newPos      = start === smartPos ? lineStart : smartPos;
        if (e.shiftKey) {
            // selectionDirection を見てアンカー端を正しく決定する (#3)
            // 'backward': カーソルは selectionStart 側、アンカーは selectionEnd 側
            // 'forward' / 'none': カーソルは selectionEnd 側、アンカーは selectionStart 側
            const dir    = editor.selectionDirection;
            const anchor = (dir === 'backward') ? editor.selectionEnd : editor.selectionStart;
            if (newPos <= anchor) {
                editor.setSelectionRange(newPos, anchor, 'backward');
            } else {
                editor.setSelectionRange(anchor, newPos, 'forward');
            }
        } else {
            editor.setSelectionRange(newPos, newPos);
        }
        updateStatus();
        return;
    }

    /* Alt+↑/↓: move line */
    if (e.altKey && !e.ctrlKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        e.preventDefault();
        const lineStart = text.lastIndexOf('\n', start - 1) + 1;
        const lineEnd   = text.indexOf('\n', start);
        if (e.key === 'ArrowUp' && lineStart > 0) {
            const prevNL    = text.lastIndexOf('\n', lineStart - 2);
            const prevStart = prevNL + 1;
            const curLine   = lineEnd === -1 ? text.substring(lineStart) : text.substring(lineStart, lineEnd);
            const prevLine  = text.substring(prevStart, lineStart - 1);
            const tail      = lineEnd === -1 ? '' : text.substring(lineEnd);
            editor.value    = text.substring(0, prevStart) + curLine + '\n' + prevLine + tail;
            const np        = prevStart + (start - lineStart);
            editor.setSelectionRange(np, np);
        } else if (e.key === 'ArrowDown' && lineEnd !== -1) {
            const nextEnd  = text.indexOf('\n', lineEnd + 1);
            const curLine  = text.substring(lineStart, lineEnd);
            const nextLine = nextEnd === -1 ? text.substring(lineEnd + 1) : text.substring(lineEnd + 1, nextEnd);
            const tail     = nextEnd === -1 ? '' : text.substring(nextEnd);
            editor.value   = text.substring(0, lineStart) + nextLine + '\n' + curLine + tail;
            const np       = lineStart + nextLine.length + 1 + (start - lineStart);
            editor.setSelectionRange(np, np);
        }
        markDirty(); saveToHistory(); lastLineCount = 0; updateLineNumbers(); updateStatus();
        scheduleGutterUpdate();
        return;
    }

    /* Auto bracket completion */
    if (AUTO_PAIR[e.key]) {
        e.preventDefault();
        const closing = AUTO_PAIR[e.key];
        if (start !== end) {
            const sel = text.substring(start, end);
            editor.setRangeText(e.key + sel + closing, start, end, 'preserve');
            editor.setSelectionRange(start + 1, end + 1);
        } else {
            editor.setRangeText(e.key + closing, start, end, 'start');
            editor.setSelectionRange(start + 1, start + 1);
        }
        markDirty(); updateStatus(); updateLineNumbers();
        return;
    }

    /* Skip over closing bracket */
    if (CLOSING_CHARS.has(e.key) && start === end && text[start] === e.key) {
        e.preventDefault();
        editor.setSelectionRange(start + 1, start + 1);
        updateStatus();
        return;
    }

    /* Backspace: delete matching pair */
    if (e.key === 'Backspace' && start === end && start > 0) {
        const prev = text[start - 1], next = text[start];
        if (AUTO_PAIR[prev] === next) {
            e.preventDefault();
            editor.setRangeText('', start - 1, start + 1, 'end');
            markDirty(); updateStatus(); updateLineNumbers();
            return;
        }
    }

    /* Enter: preserve / smart indent */
    if (e.key === 'Enter') {
        const lineStart   = text.lastIndexOf('\n', start - 1) + 1;
        const lineContent = text.substring(lineStart, start);
        const indentMatch = lineContent.match(/^[\t ]*/);
        const indent      = indentMatch ? indentMatch[0] : '';
        const prevChar    = text[start - 1];
        const nextChar    = text[start];

        if (prevChar && AUTO_PAIR[prevChar] === nextChar) {
            e.preventDefault();
            const ins = '\n' + indent + '\t' + '\n' + indent;
            editor.setRangeText(ins, start, end, 'end');
            editor.setSelectionRange(start + 1 + indent.length + 1, start + 1 + indent.length + 1);
            markDirty(); updateLineNumbers(); updateStatus();
            return;
        }

        const lineHasContent = lineContent.trim().length > 0;

        // インデントのみの行で Enter → 現在行の空白を除去して改行のみ挿入（VS Code 準拠 #4）
        if (indent && !lineHasContent) {
            e.preventDefault();
            // lineStart〜start の空白をすべて取り除き、改行だけ挿入
            editor.setRangeText('\n', lineStart, start, 'end');
            markDirty(); updateLineNumbers(); updateStatus();
            return;
        }

        if (indent && lineHasContent) {
            e.preventDefault();
            editor.setRangeText('\n' + indent, start, end, 'end');
            markDirty(); updateLineNumbers(); updateStatus();
        }
    }
});

/* =====================================================================
   GLOBAL KEYBOARD SHORTCUTS
   ===================================================================== */
window.addEventListener('keydown', e => {
    const ctrl = e.ctrlKey || e.metaKey;
    if (e.key === 'F1')  { e.preventDefault(); showHelp(); return; }
    if (e.key === 'F3')  { e.preventDefault(); e.shiftKey ? searchPrev() : searchNextBtn(); return; }
    if (ctrl) {
        // Alt+, / Alt+. : タブ切り替え
        // ※ Ctrl+Tab / Ctrl+PageUp/Down はChrome がブラウザタブ切り替えに使うため
        //   Alt+カンマ（前）/ Alt+ピリオド（次）を採用（Chrome で非干渉）
        switch (e.key.toLowerCase()) {
            case 's': e.preventDefault(); saveFile();     return;
            case 'z': e.preventDefault(); e.shiftKey ? redo() : undo(); return;
            case 'y': e.preventDefault(); redo();         return;
            case 'n': e.preventDefault(); createNewTab(); return;
            case 'w': e.preventDefault(); closeTab(activeTabId); return;
            case 'f': e.preventDefault(); {
                // 拡張メニューが閉じていれば自動展開してから検索ボックスにフォーカス
                const ext = document.getElementById('toolbar-ext');
                if (!ext.classList.contains('open')) toggleExtMenu();
                // DOM更新後にフォーカス（toggleExtMenu が display 変更するため rAF で待つ）
                requestAnimationFrame(() => {
                    const si = document.getElementById('searchInput');
                    si.focus();
                    si.select();
                });
                return;
            }
            case 'd': e.preventDefault(); duplicateLine(); return;
        }
    }
    if (e.altKey && !ctrl) {
        if (e.key.toLowerCase() === 'c') { e.preventDefault(); toggleCase();  return; }
        if (e.key.toLowerCase() === 'r') { e.preventDefault(); toggleRegex(); return; }
        // Alt+, (前のタブ) / Alt+. (次のタブ)
        if (e.key === ',' || e.key === '.') {
            e.preventDefault();
            if (tabs.length < 2) return;
            const idx  = tabs.findIndex(t => t.id === activeTabId);
            const next = e.key === ','
                ? (idx - 1 + tabs.length) % tabs.length
                : (idx + 1) % tabs.length;
            switchTab(tabs[next].id);
            return;
        }
    }
});

function duplicateLine() {
    const text      = editor.value;
    const start     = editor.selectionStart;
    const lineStart = text.lastIndexOf('\n', start - 1) + 1;
    const lineEnd   = text.indexOf('\n', start);
    const curLine   = lineEnd === -1 ? text.substring(lineStart) : text.substring(lineStart, lineEnd);
    const insPos    = lineEnd === -1 ? text.length : lineEnd;
    editor.setRangeText('\n' + curLine, insPos, insPos, 'end');
    const np = insPos + 1 + (start - lineStart);
    editor.setSelectionRange(np, np);
    markDirty(); saveToHistory(); lastLineCount = 0; updateLineNumbers(); updateStatus();
    scheduleGutterUpdate();
}

/* Line number area: click = select line, drag = select multiple lines */
(function () {
    let dragging    = false;
    let dragAnchorLine = -1; // logical line index at drag start

    function lineIndexAt(offsetY) {
        const lh = parseFloat(getComputedStyle(editor).lineHeight);
        return Math.max(0, Math.floor((offsetY + lineNumbers.scrollTop - 10) / lh));
    }

    function lineRange(lines, li) {
        // Returns {start, end} character positions for logical line li
        let pos = 0;
        for (let i = 0; i < li; i++) pos += lines[i].length + 1;
        return { start: pos, end: pos + lines[li].length };
    }

    lineNumbers.addEventListener('mousedown', e => {
        e.preventDefault(); // prevent text selection in line-number column itself
        const lines = editor.value.split('\n');
        const li    = lineIndexAt(e.offsetY);
        if (li >= lines.length) return;

        dragging       = true;
        dragAnchorLine = li;

        const { start, end } = lineRange(lines, li);
        editor.focus();
        editor.setSelectionRange(start, end);
        updateStatus();
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const lines = editor.value.split('\n');
        // Translate window-level mouse position to lineNumbers-local offsetY
        const rect   = lineNumbers.getBoundingClientRect();
        const localY = e.clientY - rect.top;
        const li     = Math.min(Math.max(0, lineIndexAt(localY)), lines.length - 1);

        const anchorRange  = lineRange(lines, dragAnchorLine);
        const currentRange = lineRange(lines, li);

        // Select from anchor to current, always covering full lines
        const selStart = Math.min(anchorRange.start, currentRange.start);
        const selEnd   = Math.max(anchorRange.end,   currentRange.end);
        editor.setSelectionRange(selStart, selEnd);
        updateStatus();
    });

    window.addEventListener('mouseup', () => { dragging = false; });
})();
