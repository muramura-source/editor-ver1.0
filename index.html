/* =====================================================================
   ENCODING
   ===================================================================== */
const ENC_LABEL = {
    SJIS:'ANSI (Shift_JIS)', UTF16LE:'UTF-16 LE', UTF16BE:'UTF-16 BE',
    UTF8:'UTF-8', UTF8BOM:'UTF-8 (BOM 付き)'
};

function updateEncodingDisplay(enc) {
    document.getElementById('sb-enc').textContent = ENC_LABEL[enc] || 'UTF-8';
}

function applyEncoding(enc) {
    const tab = getTab(activeTabId);
    if (!tab || !tab.rawData) return;
    try {
        const fromEnc = enc === 'UTF8BOM' ? 'UTF8' : enc;
        const ua = Encoding.convert(tab.rawData, { to: 'UNICODE', from: fromEnc });
        let text = Encoding.codeToString(ua);
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        editor.value = text;
        tab.encoding = enc;
        updateEncodingDisplay(enc); updateLineNumbers(); updateStatus();
    } catch (_) { showAlertModal('エラー', '文字コードの変換に失敗しました。'); }
}

function changeEncoding() {
    const enc = document.getElementById('encoding').value;
    const tab = getTab(activeTabId);
    if (tab?.rawData) { applyEncoding(enc); saveToHistory(); }
    else { updateEncodingDisplay(enc); if (tab) tab.encoding = enc; }
}

/* =====================================================================
   FILE I/O
   ===================================================================== */
async function handleFileSelect(e) {
    for (const f of Array.from(e.target.files)) await readFile(f);
    e.target.value = '';
}

function readFile(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
            const raw    = new Uint8Array(ev.target.result);
            let detected = Encoding.detect(raw);
            let target   = 'UTF8';
            if (detected === 'SJIS')         target = 'SJIS';
            else if (detected === 'UTF16LE') target = 'UTF16LE';
            else if (detected === 'UTF16BE') target = 'UTF16BE';
            else if (detected === 'UTF8' && raw[0] === 0xEF && raw[1] === 0xBB && raw[2] === 0xBF)
                target = 'UTF8BOM';
            const fromEnc = target === 'UTF8BOM' ? 'UTF8' : target;
            const ua      = Encoding.convert(raw, { to: 'UNICODE', from: fromEnc });
            let text      = Encoding.codeToString(ua);
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
            createNewTab(file.name, text, target, raw);
            resolve();
        };
        reader.readAsArrayBuffer(file);
    });
}

async function saveFile() {
    const tab = getTab(activeTabId);
    if (!tab) return false;
    const text = editor.value;
    const enc  = document.getElementById('encoding').value;
    const name = fileNameInput.value || 'untitled.txt';
    const ua   = Encoding.stringToCode(text);
    const toE  = enc === 'UTF8BOM' ? 'UTF8' : enc;
    let encoded = Encoding.convert(ua, { to: toE, from: 'UNICODE' });

    function prependBOM(bom) {
        const arr = new Uint8Array(bom.length + encoded.length);
        arr.set(bom); arr.set(encoded, bom.length); encoded = arr;
    }
    if (enc === 'UTF8BOM') prependBOM([0xEF, 0xBB, 0xBF]);
    else if (enc === 'UTF16LE' && (encoded[0] !== 0xFF || encoded[1] !== 0xFE)) prependBOM([0xFF, 0xFE]);
    else if (enc === 'UTF16BE' && (encoded[0] !== 0xFE || encoded[1] !== 0xFF)) prependBOM([0xFE, 0xFF]);

    const blob = new Blob([new Uint8Array(encoded)], { type: 'text/plain' });

    if ('showSaveFilePicker' in window) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: name,
                types: [{ description: 'テキストファイル',
                    accept: { 'text/plain': ['.txt','.csv','.html','.css','.js','.json','.md','.xml'] } }]
            });
            const w = await handle.createWritable();
            await w.write(blob); await w.close();
            fileNameInput.value = handle.name;
            updateTabNameFromInput(handle.name);
            tab.baselineContent = text;
            tab.isDirty = false;
            renderTabs(); updateGutter();
            sbInfo.textContent = '保存完了: ' + handle.name;
            setTimeout(() => sbInfo.textContent = '準備完了', 3000);
            return true;
        } catch (err) {
            if (err.name !== 'AbortError') showAlertModal('エラー', '保存に失敗しました。');
            return false; // キャンセルまたはエラー
        }
    } else {
        const url = URL.createObjectURL(blob);
        Object.assign(document.createElement('a'), { href: url, download: name }).click();
        URL.revokeObjectURL(url);
        tab.baselineContent = text;
        tab.isDirty = false;
        renderTabs(); updateGutter();
        sbInfo.textContent = 'ダウンロード完了';
        setTimeout(() => sbInfo.textContent = '準備完了', 3000);
        return true;
    }
}

/* =====================================================================
   DRAG & DROP (files onto editor area)
   ===================================================================== */
const dropZone = document.getElementById('drop-zone');
window.addEventListener('dragover',  e => { e.preventDefault(); dropZone.style.display = 'flex'; });
window.addEventListener('dragleave', e => { if (!e.relatedTarget) dropZone.style.display = 'none'; });
window.addEventListener('drop', async e => {
    e.preventDefault(); dropZone.style.display = 'none';
    const files = Array.from(e.dataTransfer.files);
    if (files.length === 0) return;
    for (const f of files) await readFile(f);
});

/* =====================================================================
   MODALS
   ===================================================================== */
/**
 * 未保存タブを閉じる際の3択モーダル
 * onClose   … 保存せずに閉じる
 * onSave    … 保存してから閉じる（saveFile() 後に onClose を呼ぶ）
 */
function showDirtyCloseModal(tabName, onClose, onSave) {
    document.getElementById('modal-title').textContent = '未保存の変更があります';
    document.getElementById('modal-body').textContent  =
        `「${tabName}」に未保存の変更があります。閉じますか？`;
    document.getElementById('modal-footer').innerHTML  =
        `<button class="tbtn" id="dcm-close"  >閉じる</button>
         <button class="tbtn" id="dcm-cancel" >閉じない</button>
         <button class="tbtn primary" id="dcm-save">保存する</button>`;
    document.getElementById('dcm-close') .onclick = () => { closeModal(); onClose(); };
    document.getElementById('dcm-cancel').onclick = () => closeModal();
    document.getElementById('dcm-save')  .onclick = () => { closeModal(); onSave(); };
    document.getElementById('modal-overlay').style.display = 'flex';
}

function showAlertModal(title, body) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal-footer').innerHTML  =
        `<button class="tbtn primary" onclick="closeModal()">OK</button>`;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function showConfirmModal(title, body, onConfirm) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;
    document.getElementById('modal-footer').innerHTML  =
        `<button class="tbtn" onclick="closeModal()">キャンセル</button>
         <button class="tbtn" style="background:var(--danger);color:#fff;border-color:var(--danger)"
                 id="conf-btn">実行</button>`;
    document.getElementById('conf-btn').onclick = onConfirm;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function showHelp() {
    const body = document.getElementById('help-body');

    const gutterLegend = `
        <div class="gutter-legend">
            <div class="gl-item">
                <div class="gl-bar" style="background:#22c55e"></div>
                <span>追加された行（保存後に新規追加）</span>
            </div>
            <div class="gl-item">
                <div class="gl-bar" style="background:#f59e0b"></div>
                <span>変更された行（保存後に内容が変わった行）</span>
            </div>
            <div class="gl-item">
                <div class="gl-bar" style="background:transparent;border:1px solid var(--border)"></div>
                <span>変更なし（保存時と同じ内容）</span>
            </div>
        </div>`;

    const sections = SHORTCUTS.map(sec => {
        const rows = sec.items.map(item => {
            const keysHtml = item.keys.map(k => `<span class="sc-key">${k}</span>`).join('');
            return `<div class="shortcut-row">
                        <div class="sc-keys">${keysHtml}</div>
                        <div class="sc-desc">${item.desc}</div>
                    </div>`;
        }).join('');
        const extra = sec.cat === '表示・ナビゲーション' ? gutterLegend : '';
        return `<div class="help-section"><h3>${sec.cat}</h3>${rows}${extra}</div>`;
    }).join('');

    body.innerHTML = sections;
    document.getElementById('help-overlay').style.display = 'flex';
}

function closeHelp() {
    document.getElementById('help-overlay').style.display = 'none';
}

/* =====================================================================
   INIT
   ===================================================================== */
/* ブラウザを閉じる・リロード時に未保存タブがあれば警告 */
window.addEventListener('beforeunload', e => {
    const hasDirty = tabs.some(t => t.isDirty);
    if (hasDirty) {
        e.preventDefault();
        e.returnValue = '未保存の変更があります。ページを離れますか？';
    }
});

window.addEventListener('load', () => {
    lucide.createIcons();
    initThemeSelect();   // populate dropdown + apply saved/default theme
    createNewTab();

    // 拡張メニューの前回状態を復元
    try {
        if (localStorage.getItem('editorExtMenu') === '1') {
            const ext = document.getElementById('toolbar-ext');
            ext.classList.add('open');
            document.getElementById('extIconExpand').style.display   = 'none';
            document.getElementById('extIconCollapse').style.display = '';
        }
    } catch (_) {}

    requestAnimationFrame(() => {
        updateStyle();
        lastLineCount = 0;
        updateLineNumbers();
        updateStatus();
        syncEditorWidth();
    });
});
